on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Set build time
        run: |
          DAY=$(date -u +%-d)
          SUFFIX="th"
          if [ "$DAY" -eq 1 ] || [ "$DAY" -eq 21 ] || [ "$DAY" -eq 31 ]; then SUFFIX="st"; fi
          if [ "$DAY" -eq 2 ] || [ "$DAY" -eq 22 ]; then SUFFIX="nd"; fi
          if [ "$DAY" -eq 3 ] || [ "$DAY" -eq 23 ]; then SUFFIX="rd"; fi
          echo "VITE_BUILD_TIME=$(date -u +'%B ')$DAY$SUFFIX$(date -u +', %Y')" >> $GITHUB_ENV

      - name: Run "npm run build"
        run: |
          npm install
          npm run build

      - name: Authenticate to AWS using GitHub OIDC (GHARole)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::621716744482:role/GHARole
          aws-region: us-east-1

      - name: S3 Sync
        run: |
          aws s3 sync ./dist s3://gabrielwelvaert.com-621716744482-us-east-1-an --delete --exclude "yan/*" --exclude "yan"
      
      - name: Cloudfront invalidation
        run:
          aws cloudfront create-invalidation --distribution-id E2N25ZYA36C2IY --paths "/*"